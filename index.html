<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Widad!</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --polaroid-bg: #fff;
            --balloon-color: #ff4d6d;
            --balloon-highlight: #fff0f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Background Canvas for Fireworks */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: none;
        }

        /* Gift Box Screen */
        .gift-container {
            z-index: 10;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .gift-box {
            font-size: 120px;
            user-select: none;
            display: inline-block;
        }

        .shake {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .hint-text {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Main Interface */
        .main-interface {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            text-align: center;
            position: relative;
            width: 100%;
            height: 100%;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 3D Balloon Style "25" */
        .bg-number {
            position: absolute;
            font-size: 40vw; 
            font-weight: bold;
            font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            line-height: 1;
            z-index: 2;
            pointer-events: none;
            user-select: none;
            color: var(--balloon-color);
            text-shadow: 
                0 1px 0 #ccc,
                0 2px 0 #c5c5c5,
                0 3px 0 #bbb,
                0 4px 0 #b0b0b0,
                0 5px 0 #aaa,
                0 10px 20px rgba(0, 0, 0, 0.4),
                inset 0 20px 30px rgba(255, 255, 255, 0.4),
                inset 0 -20px 30px rgba(0, 0, 0, 0.3);
            opacity: 0.25;
            animation: floatBalloon 4s ease-in-out infinite alternate;
        }

        .bg-number::after {
            content: "25";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--balloon-highlight);
            mix-blend-mode: overlay;
            -webkit-mask-image: radial-gradient(circle at 35% 30%, black 0%, transparent 60%);
            mask-image: radial-gradient(circle at 35% 30%, black 0%, transparent 60%);
            opacity: 0.8;
        }

        @keyframes floatBalloon {
            0% { transform: translateY(0px) rotate(-1deg); }
            100% { transform: translateY(-20px) rotate(2deg); }
        }

        /* Instax Style Photo Frame */
        .instax-card {
            background: var(--polaroid-bg);
            padding: 15px 15px 35px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transform: rotate(-3deg);
            transition: transform 0.5s ease;
            max-width: 320px;
            z-index: 3; 
            margin-top: 80px; /* Ensures clearance beneath the top arrow sign */
        }

        .instax-card:hover {
            transform: rotate(0deg) scale(1.03);
        }

        .instax-photo {
            width: 290px;
            height: 290px;
            background: #e0e0e0;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .instax-caption {
            font-family: 'Permanent Marker', 'Comic Sans MS', cursive, sans-serif;
            color: #222;
            font-size: 1.6rem;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Arrow Sign Pointing Upward from the Top */
        .arrow-sign {
            position: fixed;
            top: 30px; /* Positioned at the top of the screen */
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: bounce 2s infinite;
            z-index: 4;
        }

        .arrow-text {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffde59;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            max-width: 90vw;
            order: 2; /* Forces text below the arrow icon */
        }

        .arrow-icon {
            font-size: 3rem;
            color: #ffde59;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            line-height: 1;
            order: 1; /* Forces arrow icon to render first (at the very top) */
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <audio id="birthdaySong" src="WhatsApp Audio 2026-06-24 at 09.59.45.mpeg" loop></audio>
    <canvas id="fireworksCanvas"></canvas>

    <div class="gift-container" id="giftContainer" onclick="handleBoxClick()">
        <div class="gift-box" id="giftBox">🎁</div>
        <div class="hint-text" id="hintText">Click to open your gift!</div>
    </div>

    <div class="main-interface" id="mainInterface">
        
        <div class="arrow-sign">
            <div class="arrow-icon">↑</div>
            <div class="arrow-text">your friends are awaiting for You Widad</div>
        </div>

        <div class="bg-number">25</div>

        <div class="instax-card">
            <img src="Widad.jpeg" alt="Widad" class="instax-photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="instax-photo" style="display:none; justify-content:center; align-items:center; color:#666; font-weight:bold;">[ Add Photo Here ]</div>
            <div class="instax-caption">Happy Birthday Widad</div>
        </div>

    </div>

    <script>
        let clickCount = 0;
        const clicksRequired = 5;
        const giftBox = document.getElementById('giftBox');
        const giftContainer = document.getElementById('giftContainer');
        const hintText = document.getElementById('hintText');
        const mainInterface = document.getElementById('mainInterface');
        const fireworksCanvas = document.getElementById('fireworksCanvas');
        const audio = document.getElementById('birthdaySong');

        function handleBoxClick() {
            clickCount++;
            giftContainer.style.transform = `scale(${1 + clickCount * 0.08})`;
            
            if (clickCount === 1) {
                giftBox.classList.add('shake');
            }
            
            if (clickCount >= clicksRequired) {
                explodeGift();
            } else {
                hintText.innerText = `${clicksRequired - clickCount} more clicks to open!`;
            }
        }

        function explodeGift() {
            giftContainer.style.display = 'none';
            mainInterface.style.display = 'flex';
            fireworksCanvas.style.display = 'block';
            
            audio.play().catch(error => console.log("Audio playback waiting for interaction flag."));
            
            resizeCanvas();
            initFireworks();
        }

        /* Continuous Fireworks Engine */
        const ctx = fireworksCanvas.getContext('2d');
        let fireworks = [];
        let particles = [];

        window.addEventListener('resize', resizeCanvas);
        function resizeCanvas() {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
        }

        class Firework {
            constructor() {
                this.x = Math.random() * fireworksCanvas.width;
                this.y = fireworksCanvas.height;
                this.targetY = Math.random() * (fireworksCanvas.height * 0.5);
                this.speed = 4 + Math.random() * 3;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    createParticles(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.gravity = 0.06;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy + this.gravity;
                this.alpha -= 0.015;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function initFireworks() {
            function loop() {
                ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
                ctx.fillRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

                if (Math.random() < 0.05) {
                    fireworks.push(new Firework());
                }

                fireworks = fireworks.filter(f => {
                    const alive = f.update();
                    if (alive) f.draw();
                    return alive;
                });

                particles = particles.filter(p => {
                    const alive = p.update();
                    if (alive) p.draw();
                    return alive;
                });

                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
